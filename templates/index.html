<!DOCTYPE html>
<html lang="ko">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVID-19 약물 재창출 가상 시뮬레이터</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="app-container">

        <div class="visual-panel">
            <div class="panel-header">
                <h2>Target Protein: COVID-19 M<sup>pro</sup> (PDB ID: 6LU7)</h2>
            </div>
            <div id="protein-viewer" class="mol-container"></div>
        </div>

        <div class="control-panel">
            <div class="title-area">
                <h1>Drug Repositioning Simulator</h1>
                <p class="subtitle">코로나19 핵심 효소 가상 결합 실험실</p>
            </div>

            <div class="input-box">
                <label for="drug-select" class="input-label">결합 테스트할 후보 약물</label>
                <select id="drug-select">
                    <option value="" selected disabled>-- 약물을 선택하세요 --</option>
                    <option value="remdesivir">렘데시비르 (Remdesivir) - 실험군 1</option>
                    <option value="lopinavir">로피나비르 (Lopinavir) - 실험군 2</option>
                    <option value="nirmatrelvir">니르마르텔비르 (Nirmatrelvir) - 양성 대조군</option>
                    <option value="ibuprofen">이부프로펜 (Ibuprofen) - 음성 대조군</option>
                </select>

                <div class="button-group">
                    <button id="btn-simulate" class="btn-main">시뮬레이션 시작</button>
                    <button id="btn-view-drug" class="btn-sub" style="display: none;">약물 분자 구조 크게 보기</button>
                </div>
            </div>

            <div id="result-display" class="result-box">
                <div id="guide-message" class="guide-text">
                    결합할 약물을 선택해주세요~
                </div>

                <div id="result-content" class="result-content" style="display: none;">
                    <div class="result-header">
                        <h3 id="res-name">약물 이름</h3>
                        <span id="res-type" class="badge">구분</span>
                    </div>

                    <div class="data-row">
                        <span class="label">평균 결합 에너지 (ΔG):</span>
                        <span id="res-energy" class="value">0.0000</span>
                    </div>

                    <div class="data-block">
                        <h4>결과 평가</h4>
                        <p id="res-evaluation">평가 내용이 이곳에 표시됩니다.</p>
                    </div>

                    <div class="data-block tip-block">
                        <h4>💡 추가 정보</h4>
                        <p id="res-tip">사용 약물에 대한 추가 정보가 이곳에 표시됩니다.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
